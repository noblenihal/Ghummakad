services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/self-host/initdb:/docker-entrypoint-initdb.d:ro
      - ./supabase:/supabase:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  auth:
    image: supabase/gotrue:v2.192.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: '9999'
      API_EXTERNAL_URL: ${SITE_URL}/auth/v1
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_DB_NAMESPACE: auth
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${SITE_URL}/*
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: '3600'
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_DISABLE_SIGNUP: 'false'
      GOTRUE_EXTERNAL_EMAIL_ENABLED: 'true'
      # No SMTP yet — accounts auto-confirm on signup so demo users can log in.
      GOTRUE_MAILER_AUTOCONFIRM: 'true'
      GOTRUE_PASSWORD_MIN_LENGTH: '6'
      # Google OAuth — enabled once GOOGLE_CLIENT_ID/SECRET are set in .env.local
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_AUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${SITE_URL}/auth/v1/callback
    restart: unless-stopped

  rest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

  web:
    build:
      context: .
      args:
        # Baked into the client bundle. Same-origin URL: Caddy serves /auth/v1
        # and /rest/v1 alongside the app, so the public URL is the Supabase URL.
        NEXT_PUBLIC_SUPABASE_URL: ${SITE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    environment:
      NODE_ENV: production
      PORT: '3000'
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # Server verifies tokens through the internal caddy so it never leaves net.
      SUPABASE_URL: http://caddy
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - auth
      - rest
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - '8081:80'
    volumes:
      - ./caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - auth
      - rest
    restart: unless-stopped

volumes:
  db_data:
  caddy_data:
  caddy_config:
